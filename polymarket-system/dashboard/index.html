<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POLY//WATCH — Niche Bot Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #09090f;
    --surface:   #0f0f1a;
    --border:    #1e1e30;
    --accent:    #00ff88;
    --accent2:   #7b61ff;
    --warn:      #ff6b35;
    --text:      #e8e8f0;
    --muted:     #6b6b85;
    --red:       #ff3b5c;
    --green:     #00ff88;
    --mono:      'Syne Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Header */
  .hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .hdr-logo {
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,136,0.5);
  }
  .hdr-logo span { color: var(--muted); }
  .hdr-right { display: flex; align-items: center; gap: 12px; }
  .pill {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 20px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
    border: 1px solid;
  }
  .pill.live   { border-color: var(--red);   color: var(--red);   background: rgba(255,59,92,.1); }
  .pill.dry    { border-color: var(--accent2); color: var(--accent2); background: rgba(123,97,255,.1); }
  .pill.scan   { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,.1); animation: pulse 1s infinite; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn.primary:disabled .spinner { display:inline-block; animation: spin 1s linear infinite; }

  /* Layout */
  .layout { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 53px); }

  /* Sidebar (desktop) */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 0;
    background: var(--surface);
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; cursor: pointer;
    color: var(--muted); font-size: 13px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    border-left: 2px solid transparent;
    transition: all .15s;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent);
    background: rgba(0,255,136,.05); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-sep { height: 1px; background: var(--border); margin: 12px 20px; }
  .sidebar-label {
    padding: 4px 20px 8px;
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
  }

  /* Mobile bottom tab bar */
  .mobile-tabs {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 100;
    padding: 0; margin: 0;
  }
  .mobile-tabs-inner {
    display: flex;
    justify-content: space-around;
    align-items: stretch;
    padding: 4px 0;
  }
  .mob-tab {
    flex: 1;
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; padding: 8px 4px;
    cursor: pointer; border: none; background: none;
    color: var(--muted); font-family: var(--mono);
    font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
    transition: color .15s;
  }
  .mob-tab .mob-icon { font-size: 18px; }
  .mob-tab.active { color: var(--accent); }

  /* Main content */
  .main { padding: 24px; overflow-y: auto; }

  /* Section title */
  .section-title {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 3px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Stat cards */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card.green::before { background: var(--green); }
  .stat-card.purple::before { background: var(--accent2); }
  .stat-card.orange::before { background: var(--warn); }
  .stat-card.red::before { background: var(--red); }
  .stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .stat-val { font-family: var(--mono); font-size: 28px; font-weight: 700;
    line-height: 1; }
  .stat-val.green  { color: var(--green); }
  .stat-val.purple { color: var(--accent2); }
  .stat-val.orange { color: var(--warn); }
  .stat-val.red    { color: var(--red); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Tables */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; margin-bottom: 24px;
  }
  .table-head {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--muted);
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    padding: 8px 12px; text-align: left;
    font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  td {
    padding: 10px 12px; border-bottom: 1px solid rgba(30,30,48,.8);
    font-size: 12px; vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .mono { font-family: var(--mono); font-size: 11px; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--accent); }
  th .sort-arrow { margin-left: 4px; font-size: 8px; }
  .filter-bar {
    display: flex; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap; align-items: center;
  }
  .filter-bar input, .filter-bar select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: var(--mono); font-size: 11px;
    padding: 5px 8px; outline: none;
  }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
  .filter-bar input { flex: 1; min-width: 140px; }
  .filter-bar select { min-width: 80px; }
  .filter-bar label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 4px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
  }
  .badge.yes   { background: rgba(0,255,136,.12); color: var(--green); border: 1px solid rgba(0,255,136,.2); }
  .badge.no    { background: rgba(255,59,92,.12); color: var(--red);   border: 1px solid rgba(255,59,92,.2); }
  .badge.dry   { background: rgba(123,97,255,.12); color: var(--accent2); border: 1px solid rgba(123,97,255,.2); }
  .badge.live  { background: rgba(255,107,53,.12); color: var(--warn); border: 1px solid rgba(255,107,53,.2); }
  .badge.filled { background: rgba(0,255,136,.2); color: var(--green); border: 1px solid var(--green); }
  .badge.error { background: rgba(255,59,92,.2); color: var(--red); border: 1px solid var(--red); }

  /* Edge bar */
  .edge-bar { display: flex; align-items: center; gap: 8px; }
  .edge-track {
    flex: 1; height: 4px; background: rgba(255,255,255,.06);
    border-radius: 2px; overflow: hidden;
  }
  .edge-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .edge-val { font-family: var(--mono); font-size: 11px; color: var(--accent); min-width: 36px; }

  /* Btn */
  .btn {
    padding: 8px 16px; border-radius: 6px; border: none;
    cursor: pointer; font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; transition: all .15s;
  }
  .btn.primary {
    background: var(--accent); color: #000; font-weight: 700;
    box-shadow: 0 0 20px rgba(0,255,136,.3);
  }
  .btn.primary:hover { box-shadow: 0 0 30px rgba(0,255,136,.5); }
  .btn.primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn.ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn.ghost:hover { color: var(--text); border-color: var(--muted); }

  /* Log panel */
  .log-panel {
    background: #06060e; border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; font-family: var(--mono); font-size: 11px;
    line-height: 1.7; color: var(--muted); max-height: 300px; overflow-y: auto;
  }
  .log-line.info   { color: var(--muted); }
  .log-line.signal { color: var(--accent); }
  .log-line.trade  { color: var(--warn); }
  .log-line.error  { color: var(--red); }

  /* Next scan timer */
  .next-scan {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }
  .next-scan span { color: var(--accent2); }

  /* ── Responsive ──────────────────────────────────────────── */

  /* Tablet: compact sidebar */
  @media (max-width: 1024px) {
    .layout { grid-template-columns: 56px 1fr; }
    .sidebar { padding: 12px 0; overflow: hidden; }
    .nav-item { justify-content: center; padding: 12px 0; }
    .nav-item .nav-label { display: none; }
    .nav-icon { font-size: 18px; width: auto; }
    .sidebar-sep, .sidebar-label, .sidebar .quick-stats { display: none; }
    .stats-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }

  /* Mobile: no sidebar, bottom tabs */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; min-height: calc(100vh - 53px - 62px); }
    .sidebar { display: none; }
    .mobile-tabs { display: block; }
    .main { padding: 16px; padding-bottom: 80px; }

    .hdr { padding: 10px 16px; }
    .hdr-logo { font-size: 15px; letter-spacing: 3px; }
    .hdr-right .hdr-time { display: none; }
    .pill { font-size: 10px; padding: 3px 8px; }

    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
    .stat-card { padding: 12px; }
    .stat-val { font-size: 22px; }
    .stat-label { font-size: 8px; }

    .section-title { font-size: 10px; letter-spacing: 2px; margin-bottom: 12px; }

    /* Horizontal scroll for tables */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { min-width: 600px; }
    th { font-size: 8px; padding: 6px 8px; }
    td { font-size: 11px; padding: 8px; }

    .log-panel { font-size: 10px; max-height: 260px; padding: 12px; }

    /* Bot status grid */
    .bot-status-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
  }

  /* Small mobile */
  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .stat-card { padding: 10px; }
    .stat-val { font-size: 18px; }
    .main { padding: 12px; padding-bottom: 76px; }
    .hdr { padding: 8px 12px; }
    .hdr-logo { font-size: 13px; letter-spacing: 2px; }
    table { min-width: 520px; }
  }

  /* Empty state */
  .empty {
    padding: 40px; text-align: center;
    color: var(--muted); font-family: var(--mono); font-size: 12px;
    letter-spacing: 2px;
  }

  /* Charts */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; position: relative;
  }
  .chart-card canvas { max-height: 260px; }
  .chart-title {
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
  }
  .chart-full { grid-column: 1 / -1; }
  .city-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  .city-chip {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; font-family: var(--mono); font-size: 11px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .city-chip .city-name { color: var(--accent2); font-weight: 700; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .city-chip .city-stat { color: var(--muted); font-size: 9px; letter-spacing: 1px; }

  /* Timeline */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before {
    content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
    width: 1px; background: var(--border);
  }
  .tl-item { position: relative; padding: 8px 0 16px 16px; }
  .tl-item::before {
    content: ''; position: absolute; left: -20px; top: 12px;
    width: 8px; height: 8px; border-radius: 50%;
    border: 2px solid var(--border); background: var(--bg);
  }
  .tl-item.scan::before { border-color: var(--accent2); background: rgba(123,97,255,.3); }
  .tl-item.signal::before { border-color: var(--accent); background: rgba(0,255,136,.3); }
  .tl-item.trade::before { border-color: var(--warn); background: rgba(255,107,53,.3); }
  .tl-time { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .tl-msg { font-size: 12px; line-height: 1.4; }
  .tl-msg .tl-city { color: var(--accent2); font-weight: 700; }
  .tl-msg .tl-edge { color: var(--accent); font-family: var(--mono); }
  .tl-msg .tl-dir { font-family: var(--mono); font-weight: 700; }
  .tl-msg .tl-dir.yes { color: var(--green); }
  .tl-msg .tl-dir.no { color: var(--red); }

  @media (max-width: 768px) {
    .chart-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const API = window.location.origin + '/api';

function useInterval(fn, ms) {
  const ref = useRef(fn);
  useEffect(() => { ref.current = fn; }, [fn]);
  useEffect(() => {
    const id = setInterval(() => ref.current(), ms);
    return () => clearInterval(id);
  }, [ms]);
}

function fmt(v, dec=2) { return v == null ? '—' : Number(v).toFixed(dec); }
function fmtTs(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
function eventSlug(slug) {
  if (!slug) return slug;
  // Strip temperature condition suffix after the year to get the event-level slug
  // e.g. "highest-temperature-in-seoul-on-march-29-2026-14c" → "highest-temperature-in-seoul-on-march-29-2026"
  return slug.replace(/(-\d{4})-.*$/, '$1');
}
function fmtCountdown(dateStr) {
  if (!dateStr) return '—';
  // Market resolves at end of day UTC for the given date
  const end = new Date(dateStr + 'T23:59:59Z');
  const now = new Date();
  const diff = end - now;
  if (diff <= 0) return 'closed';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (h >= 24) return `${Math.floor(h/24)}d ${h%24}h`;
  return `${h}h ${m}m`;
}
function fmtPnl(v) {
  if (v == null) return <span style={{color:'var(--muted)'}}>pending</span>;
  const c = v >= 0 ? 'var(--green)' : 'var(--red)';
  return <span style={{color:c, fontFamily:'var(--mono)'}}>{v >= 0 ? '+' : ''}{fmt(v)}</span>;
}

// ── Nav ────────────────────────────────────────────────────────────────────────
const NAV = [
  { id:'overview',   icon:'◉', label:'Overview' },
  { id:'signals',    icon:'◈', label:'Signals' },
  { id:'trades',     icon:'◆', label:'Trades' },
  { id:'analytics',  icon:'◐', label:'Analytics' },
  { id:'log',        icon:'▣', label:'Activity Log' },
  { id:'config',     icon:'◧', label:'Config' },
];

// ── Stats bar ─────────────────────────────────────────────────────────────────
function StatCard({ label, value, sub, color='green' }) {
  return (
    <div className={`stat-card ${color}`}>
      <div className="stat-label">{label}</div>
      <div className={`stat-val ${color}`}>{value}</div>
      {sub && <div className="stat-sub">{sub}</div>}
    </div>
  );
}

// ── Edge bar ──────────────────────────────────────────────────────────────────
function EdgeBar({ pts }) {
  const pct = Math.min(pts / 50 * 100, 100);
  return (
    <div className="edge-bar">
      <div className="edge-track"><div className="edge-fill" style={{width:`${pct}%`}} /></div>
      <div className="edge-val">{fmt(pts,1)}pt</div>
    </div>
  );
}

// ── Status pill ───────────────────────────────────────────────────────────────
function StatusPill({ running, mode }) {
  if (running) return <div className="pill scan"><div className="dot" />SCANNING</div>;
  return <div className={`pill ${mode === 'LIVE' ? 'live' : 'dry'}`}>
    <div className="dot" />{mode}
  </div>;
}

// ── Overview tab ──────────────────────────────────────────────────────────────
function Overview({ stats, status, onTrigger, scanning }) {
  const [countdown, setCountdown] = useState('');
  useEffect(() => {
    if (!status?.next_scan) return;
    const tick = () => {
      const diff = Math.max(0, status.next_scan - Date.now()/1000);
      const m = Math.floor(diff/60), s = Math.floor(diff%60);
      setCountdown(`${m}m ${String(s).padStart(2,'0')}s`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [status?.next_scan]);

  const pnlColor = stats?.total_pnl >= 0 ? 'green' : 'red';

  return (
    <div>
      <p className="section-title">PERFORMANCE</p>
      <div className="stats-grid">
        <StatCard label="Total Trades"   value={stats?.total_trades ?? '…'} color="purple" sub={`${stats?.settled ?? 0} settled`} />
        <StatCard label="Win Rate"       value={stats?.win_rate ? `${(stats.win_rate*100).toFixed(0)}%` : '—'} color="green" sub={`${stats?.wins ?? 0} wins`} />
        <StatCard label="Total P&L"      value={stats?.total_pnl != null ? `$${fmt(stats.total_pnl)}` : '—'} color={pnlColor} sub="USDC" />
        <StatCard label="Avg Edge"       value={stats?.avg_edge ? `${fmt(stats.avg_edge,1)}pt` : '—'} color="orange" sub="per trade" />
        <StatCard label="Avg EV/10"      value={stats?.avg_ev != null ? `$${fmt(stats.avg_ev)}` : '—'} color="green" sub="expected per $10" />
        <StatCard label="Scans Done"     value={status?.scan_count ?? 0} color="purple" sub="total cycles" />
      </div>

      <p className="section-title">BOT STATUS</p>
      <div className="table-wrap" style={{marginBottom:24}}>
        <div className="bot-status-grid" style={{padding:'16px 20px', display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:16}}>
          <div>
            <div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--muted)',letterSpacing:2,marginBottom:6}}>MODE</div>
            <div className={`badge ${status?.mode?.includes('LIVE') ? 'live' : 'dry'}`} style={{fontSize:12}}>
              {status?.mode ?? '…'}
            </div>
          </div>
          <div>
            <div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--muted)',letterSpacing:2,marginBottom:6}}>LAST SCAN</div>
            <div className="mono">{fmtTs(status?.last_scan)}</div>
          </div>
          <div>
            <div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--muted)',letterSpacing:2,marginBottom:6}}>NEXT SCAN</div>
            <div className="next-scan">in <span>{countdown || '…'}</span></div>
          </div>
          <div>
            <div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--muted)',letterSpacing:2,marginBottom:6}}>ENSEMBLE</div>
            <div className="mono" style={{color:'var(--warn)',fontSize:11}}>{(status?.ensemble_models||[]).join(' + ')}</div>
          </div>
        </div>

// ── Sort helper ──────────────────────────────────────────────────────────────
function useSort(defaultKey, defaultDir='desc') {
  const [sortKey, setSortKey] = useState(defaultKey);
  const [sortDir, setSortDir] = useState(defaultDir);
  const toggle = (key) => {
    if (key === sortKey) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('desc'); }
  };
  const arrow = (key) => key === sortKey ? (sortDir === 'asc' ? '▲' : '▼') : '';
  const sortFn = (a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb+'').toLowerCase(); }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  };
  return { sortKey, sortDir, toggle, arrow, sortFn };
}

function SortTh({ k, label, sort }) {
  return (
    <th className="sortable" onClick={() => sort.toggle(k)}>
      {label}<span className="sort-arrow">{sort.arrow(k)}</span>
    </th>
  );
}

// ── Chart wrapper (Chart.js + React) ─────────────────────────────────────
function ChartCanvas({ type, data, options, style }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, { type, data, options });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [type, JSON.stringify(data), JSON.stringify(options)]);
  return <canvas ref={ref} style={style} />;
}

    ...signals.filter(s => !s.acted).map(s => ({
      ts: s.ts, type: 'signal',
      msg: <span><span className="tl-city">{s.city}</span> {s.outcome} &rarr; {s.direction} &middot; <span className="tl-edge">{fmt(s.edge_pts,1)}pt</span></span>
    })),
  ].sort((a,b) => new Date(b.ts) - new Date(a.ts)).slice(0, 30);

  return (
    <div>
      <p className="section-title">PERFORMANCE CHARTS</p>
      <div className="chart-grid">
        <div className="chart-card chart-full">
          <div className="chart-title">Cumulative P&L + Exposure</div>
          <div style={{height: 260}}>
            <ChartCanvas type="line" data={pnlChartData} options={pnlChartOpts} />
          </div>
        </div>

        <div className="chart-card">
          <div className="chart-title">Edge vs Probability</div>
          <div style={{height: 240}}>
            <ChartCanvas type="scatter" data={edgeChartData} options={edgeChartOpts} />
          </div>
        </div>

        <div className="chart-card">
          <div className="chart-title">Edge Distribution</div>
          <div style={{height: 240}}>
            <ChartCanvas type="bar" data={histData} options={histOpts} />
          </div>
        </div>

        <div className="chart-card">
          <div className="chart-title">Trades by City</div>
          <div style={{height: Math.max(200, citySorted.length * 28)}}>
            <ChartCanvas type="bar" data={cityChartData} options={cityChartOpts} />
          </div>
        </div>

        <div className="chart-card">
          <div className="chart-title">Direction Split</div>
          <div style={{height: 240}}>
            <ChartCanvas type="doughnut" data={dirData} options={dirOpts} />
          </div>
        </div>
      </div>

      <p className="section-title">CITY BREAKDOWN</p>
      <div className="city-grid" style={{marginBottom: 24}}>
        {citySorted.map(([city, s]) => (
          <div key={city} className="city-chip">
            <div className="city-name">{city}</div>
            <div className="city-stat">{s.trades} trades &middot; ${fmt(s.bet)}</div>
            <div className="city-stat" style={{color: s.wins > 0 ? 'var(--green)' : s.losses > 0 ? 'var(--red)' : 'var(--muted)'}}>
              {s.wins}W {s.losses}L {s.pending}P
            </div>
          </div>
        ))}
      </div>

      <p className="section-title">TIMELINE</p>
      <div className="chart-card">
        <div className="timeline">
          {timelineItems.length === 0 && <div className="empty">NO ACTIVITY YET</div>}
          {timelineItems.map((item, i) => (
            <div key={i} className={`tl-item ${item.type}`}>
              <div className="tl-time">{new Date(item.ts).toLocaleString('en-GB', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
              <div className="tl-msg">{item.msg}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  const [tab,     setTab]     = useState('overview');
  const [status,  setStatus]  = useState(null);
  const [scanning, setScanning] = useState(false);
  const [stats,   setStats]   = useState(null);
  const [trades,  setTrades]  = useState([]);
  const [signals, setSignals] = useState([]);
  const [scans,   setScans]   = useState([]);
  const [config,  setConfig]  = useState(null);
  const [resolutions, setResolutions] = useState(null);

  const fetchAll = useCallback(async () => {
    try {
      const [st, sta, tr, si, sc, cf, res] = await Promise.all([
        fetch(`${API}/status`).then(r=>r.json()),
        fetch(`${API}/stats`).then(r=>r.json()),
        fetch(`${API}/trades?limit=500`).then(r=>r.json()),
        fetch(`${API}/signals?limit=500`).then(r=>r.json()),
        fetch(`${API}/scans?limit=200`).then(r=>r.json()),
        fetch(`${API}/config`).then(r=>r.json()),
        fetch(`${API}/resolutions`).then(r=>r.json()),
      ]);
      setStatus(st); setStats(sta); setTrades(tr);
      setSignals(si); setScans(sc); setConfig(cf); setResolutions(res);
    } catch(e) { /* backend not up yet */ }
  }, []);

  useEffect(() => { fetchAll(); }, []);
  useInterval(fetchAll, 5000);  // refresh every 5s

  const triggerScan = async () => {
    setScanning(true);
    try {
      await fetch(`${API}/scan/trigger`, { method:'POST' });
      await fetchAll();
    } finally {
      setScanning(false);
    }
  };

  const resolveTrade = async (id, pnl) => {
    await fetch(`${API}/trades/resolve`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ trade_id: id, pnl })
    });
    fetchAll();
  };

  return (
    <>
      {/* Header */}
      <header className="hdr">
        <div className="hdr-logo">POLY<span>//</span>WATCH</div>
        <div className="hdr-right">
          <StatusPill running={status?.running} mode={status?.mode ?? '…'} />
          <span className="hdr-time" style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted)'}}>
            {new Date().toLocaleTimeString('en-GB')}
          </span>
        </div>
      </header>

      <div className="layout">
        {/* Sidebar (desktop/tablet — hidden on mobile) */}
        <nav className="sidebar">
          <div className="sidebar-label">Navigation</div>
          {NAV.map(n => (
            <div key={n.id} className={`nav-item ${tab===n.id?'active':''}`}
                 onClick={()=>setTab(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              <span className="nav-label">{n.label}</span>
            </div>
          ))}
          <div className="sidebar-sep" />
          <div className="sidebar-label">Quick Stats</div>
          <div className="quick-stats" style={{padding:'0 16px'}}>
            {[
              ['Trades',  stats?.total_trades ?? '…'],
              ['Win Rate', stats?.win_rate ? `${(stats.win_rate*100).toFixed(0)}%` : '—'],
              ['P&L',     stats?.total_pnl != null ? `$${fmt(stats.total_pnl)}` : '—'],
            ].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',
                padding:'6px 4px',fontSize:12,borderBottom:'1px solid var(--border)'}}>
                <span style={{color:'var(--muted)',fontFamily:'var(--mono)',fontSize:10}}>{k}</span>
                <span style={{fontFamily:'var(--mono)',color:'var(--text)'}}>{v}</span>
              </div>
            ))}
          </div>
        </nav>

        {/* Main */}
        <main className="main">
          {tab === 'overview'   && <Overview stats={stats} status={status} onTrigger={triggerScan} scanning={scanning} />}
          {tab === 'analytics'  && <Analytics trades={trades} signals={signals} resolutions={resolutions} scans={scans} />}
          {tab === 'signals'    && <Signals signals={signals} />}
          {tab === 'trades'     && <Trades trades={trades} resolutions={resolutions} onResolve={resolveTrade} />}
          {tab === 'log'        && <ActivityLog scans={scans} signals={signals} />}
          {tab === 'config'     && <Config config={config} />}
        </main>
      </div>

      {/* Mobile bottom tab bar */}
      <nav className="mobile-tabs">
        <div className="mobile-tabs-inner">
          {NAV.map(n => (
            <button key={n.id} className={`mob-tab ${tab===n.id?'active':''}`}
                    onClick={()=>setTab(n.id)}>
              <span className="mob-icon">{n.icon}</span>
              {n.label}
            </button>
          ))}
        </div>
      </nav>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
