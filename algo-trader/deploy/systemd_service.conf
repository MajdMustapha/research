[Unit]
Description=Algo Trader Bot
After=network.target

[Service]
Type=simple
User=trader
Group=trader
WorkingDirectory=/opt/algo-trader
ExecStart=/opt/algo-trader/.venv/bin/python main.py --mode paper
Restart=on-failure
RestartSec=30
Environment=PYTHONUNBUFFERED=1

# Security hardening
NoNewPrivileges=yes
ProtectSystem=strict
ReadWritePaths=/opt/algo-trader

[Install]
WantedBy=multi-user.target
